apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
spec:
 replicas: 2
 selector:
   matchLabels:
    app: myapp
 template: 
    metadata:
      labels:
        app: myapp
    spec:
      containers:
        - name: myapp
          image: 991727098679.dkr.ecr.ap-south-1.amazonaws.com/myapp:v1
          ports:
          - containerPort: 3000
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
              
