version: '3.8'
services: 
  app: 
    image: devopsapp:final
    ports: 
      - "3000:3000"
    environment:
      - APP_ENV=PRODUCTION
      - DB_HOST=mongodb 
    depends_on:
      - mongodb
  
  mongodb: 
    image: mongo:6
    ports: 
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
  
  mongo_express:
    image: mongo-express
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongodb
    depends_on:
      - mongodb
  
volumes:
    mongo_data:

